backend:
  name: git-gateway
  branch: main

# Enables editing against the local repo when `npm run cms-local` is running
# (ignored in production — it only activates if the local proxy is detected).
local_backend: true

media_folder: "images"
public_folder: "/images"

site_url: https://coveredaccess.netlify.app
display_url: https://coveredaccess.netlify.app
logo_url: /images/covered-logo.svg

locale: "en"

collections:
  - name: "content"
    label: "✏️ Website Content"
    files:
      - name: "site"
        label: "⚙️ Site-wide (title, contact, CTA)"
        file: "src/_data/site.json"
        fields:
          - { label: "Page title (browser tab)", name: "pageTitle", widget: "string" }
          - { label: "Meta description (search engines)", name: "metaDescription", widget: "text" }
          - { label: "Social share description", name: "ogDescription", widget: "text" }
          - { label: "Contact email", name: "contactEmail", widget: "string" }
          - { label: "Footer tagline", name: "footerTagline", widget: "string" }
          - { label: "Last updated date (shown in footer)", name: "lastUpdated", widget: "string" }
          - { label: "Closing banner — heading", name: "ctaBannerTitle", widget: "string" }
          - { label: "Closing banner — text", name: "ctaBannerText", widget: "text" }
          - { label: "Closing banner — button label", name: "ctaBannerButton", widget: "string" }

      - name: "hero"
        label: "🏠 Hero (top of page)"
        file: "src/_data/hero.json"
        fields:
          - { label: "Badge text", name: "badge", widget: "string" }
          - { label: "Headline — main part", name: "headlineMain", widget: "string" }
          - { label: "Headline — accent part (red)", name: "headlineAccent", widget: "string" }
          - { label: "Stamp text", name: "stamp", widget: "string" }
          - { label: "Subheading", name: "subhead", widget: "text" }
          - { label: "Button — brand CTA", name: "ctaBrand", widget: "string" }
          - { label: "Button — venue CTA", name: "ctaVenue", widget: "string" }
          - { label: "Scroll-down link text", name: "scrollText", widget: "string" }

      - name: "problem"
        label: "📊 The Problem section"
        file: "src/_data/problem.json"
        fields:
          - { label: "Kicker (small label above heading)", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed, e.g. <br />)", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - label: "Statistics"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number (%)", name: "number", widget: "number" }
              - { label: "Label text", name: "label", widget: "text" }
          - { label: "Source citation text", name: "sourceText", widget: "string" }
          - { label: "Source URL", name: "sourceUrl", widget: "string" }
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Image path", name: "src", widget: "hidden" }
              - { label: "Width", name: "width", widget: "hidden" }
              - { label: "Height", name: "height", widget: "hidden" }
              - { label: "Rotation", name: "tilt", widget: "hidden" }
              - { label: "Alt text (accessibility)", name: "alt", widget: "text" }
              - { label: "Caption", name: "caption", widget: "string" }

      - name: "model"
        label: "🔁 The Model (Brands pay. You don't.)"
        file: "src/_data/model.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - label: "Steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

      - name: "how"
        label: "📱 How It Works (demo section text)"
        file: "src/_data/how.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - { label: "Note below the demo", name: "demoNote", widget: "text" }

      - name: "brands"
        label: "📣 For Brands section"
        file: "src/_data/brands.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed)", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - label: "Header photo"
            name: "headerPhoto"
            widget: "object"
            fields:
              - { label: "Image path", name: "src", widget: "hidden" }
              - { label: "Width", name: "width", widget: "hidden" }
              - { label: "Height", name: "height", widget: "hidden" }
              - { label: "Alt text (accessibility)", name: "alt", widget: "text" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Benefits"
            name: "benefits"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - label: "Chips"
            name: "chips"
            widget: "list"
            field: { label: "Chip text", name: "chip", widget: "string" }
          - { label: "Form heading", name: "formHeading", widget: "string" }
          - { label: "Form button label", name: "formButton", widget: "string" }
          - { label: "Form hint text", name: "formHint", widget: "string" }

      - name: "partners"
        label: "🤝 Partners wall"
        file: "src/_data/partners.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed)", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - label: "Partner slots"
            name: "slots"
            widget: "list"
            fields:
              - { label: "Founding-partner slot?", name: "founding", widget: "boolean", default: false }
              - { label: "Logo text / brand name", name: "logoText", widget: "string" }
              - { label: "Category label", name: "category", widget: "string" }
          - { label: "Button label", name: "ctaButton", widget: "string" }

      - name: "venues"
        label: "🏟️ For Venues section"
        file: "src/_data/venues.json"
        fields:
          - { label: "Pilot ribbon text", name: "ribbon", widget: "string" }
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed)", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - label: "We handle (list)"
            name: "weHandle"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - label: "You provide (list)"
            name: "youProvide"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Form heading", name: "formHeading", widget: "string" }
          - { label: "Form button label", name: "formButton", widget: "string" }
          - { label: "Form hint text", name: "formHint", widget: "string" }

      - name: "locations"
        label: "🗺️ Locations / UK map"
        file: "src/_data/locations.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed)", name: "title", widget: "string" }
          - { label: "Subheading", name: "subtitle", widget: "text" }
          - { label: "Map viewBox (do not edit)", name: "svgViewBox", widget: "hidden" }
          - { label: "Map alt text (do not edit)", name: "svgAriaLabel", widget: "hidden" }
          - { label: "Map geometry — neighbours (do not edit)", name: "neighborPath", widget: "hidden" }
          - { label: "Map geometry — UK (do not edit)", name: "landPath", widget: "hidden" }
          - label: "Cities"
            name: "cities"
            widget: "list"
            fields:
              - { label: "ID (do not edit)", name: "id", widget: "hidden" }
              - { label: "City name", name: "name", widget: "string" }
              - { label: "Map X position (do not edit)", name: "x", widget: "hidden" }
              - { label: "Map Y position (do not edit)", name: "y", widget: "hidden" }
              - { label: "Is this the live pilot city?", name: "live", widget: "boolean", default: false }
              - { label: "Description shown when selected", name: "blurb", widget: "text" }
          - label: "Venue types targeted"
            name: "placeTypes"
            widget: "list"
            fields:
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "Button label", name: "ctaButton", widget: "string" }

      - name: "vision"
        label: "🚀 Vision / roadmap"
        file: "src/_data/vision.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading (HTML allowed)", name: "title", widget: "string" }
          - label: "Milestones"
            name: "milestones"
            widget: "list"
            fields:
              - { label: "Phase tag", name: "tag", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - { label: "'Build in public' heading", name: "bipTitle", widget: "string" }
          - { label: "'Build in public' text", name: "bipText", widget: "text" }
          - label: "Social channel chips"
            name: "soonChips"
            widget: "list"
            field: { label: "Chip text", name: "chip", widget: "string" }

      - name: "faq"
        label: "❓ FAQ"
        file: "src/_data/faq.json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string" }
          - { label: "Heading", name: "title", widget: "string" }
          - label: "Questions"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

  # ---------------------------------------------------------------
  # Editor-created pages: assembled from configurable blocks.
  # ---------------------------------------------------------------
  - name: "pages"
    label: "📄 Pages (add your own)"
    label_singular: "Page"
    folder: "src/pages"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Page title", name: "title", widget: "string" }
      - { label: "URL path", name: "permalink", widget: "string", hint: "Where the page will live, e.g. /about/ — lowercase, wrapped in slashes", pattern: ["^/[a-z0-9-]+/$", "Must look like /about/ — lowercase letters, numbers or dashes, wrapped in slashes"] }
      - { label: "Search description", name: "description", widget: "string", required: false }
      - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }
      - label: "Page sections"
        name: "sections"
        widget: "list"
        summary: "{{fields.heading}}{{fields.title}}"
        types:
          - label: "🏠 Big heading (top of page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Heading — orange part", name: "accent", widget: "string", required: false }
              - { label: "Subtitle", name: "sub", widget: "text", required: false }
              - { label: "Button text", name: "ctaText", widget: "string", required: false }
              - { label: "Button link", name: "ctaLink", widget: "string", required: false, hint: "e.g. /#brands or /about/" }
          - label: "📝 Text section"
            name: "text"
            widget: "object"
            fields:
              - { label: "Small label above heading", name: "kicker", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Text", name: "body", widget: "markdown" }
          - label: "🖼️ Image + text"
            name: "imageText"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image description (accessibility)", name: "alt", widget: "string" }
              - { label: "Caption under image", name: "caption", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Text", name: "body", widget: "markdown" }
              - { label: "Image on the right?", name: "imageRight", widget: "boolean", default: false }
          - label: "🔢 Number cards"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - label: "Cards"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Big number (e.g. 11% or 20+)", name: "number", widget: "string" }
                  - { label: "Label underneath", name: "label", widget: "string" }
          - label: "📣 Big orange banner"
            name: "banner"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text", required: false }
              - { label: "Button text", name: "buttonText", widget: "string", required: false }
              - { label: "Button link", name: "buttonLink", widget: "string", required: false }
          - label: "❓ Questions & answers"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - label: "Questions"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Question", name: "q", widget: "string" }
                  - { label: "Answer", name: "a", widget: "text" }

  # ---------------------------------------------------------------
  # Direct channel to Claude: publishing an entry commits it to the
  # repo, where Claude reads and actions it.
  # ---------------------------------------------------------------
  - name: "requests"
    label: "🤖 Ask Claude (change requests)"
    label_singular: "request"
    folder: "requests"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "What do you want changed?", name: "title", widget: "string" }
      - { label: "Details — the more specific, the better", name: "body", widget: "markdown" }
      - { label: "Which page or section?", name: "where", widget: "string", required: false }
      - { label: "How urgent?", name: "priority", widget: "select", options: ["Whenever", "This week", "ASAP"], default: "Whenever" }
      - { label: "Status (Claude updates this)", name: "status", widget: "select", options: ["New", "In progress", "Done"], default: "New" }

