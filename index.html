<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>covered</title>
  <meta name="description" content="covered — coming soon." />

  <!-- Favicon (simple inline SVG dot) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23e8e6e1'/></svg>" />

  <style>
    :root {
      --bg: #0e0e10;
      --bg-accent: #16161a;
      --fg: #e8e6e1;
      --muted: #8a8a93;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #c7b9a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, var(--bg-accent), transparent 70%),
        var(--bg);
      color: var(--fg);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(2.75rem, 12vw, 6rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .logo .dot { color: var(--accent); }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: var(--muted);
      max-width: 32ch;
      line-height: 1.5;
    }

    .badge {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(199, 185, 160, 0.6);
      animation: pulse 2.2s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(199, 185, 160, 0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(199, 185, 160, 0); }
      100% { box-shadow: 0 0 0 0 rgba(199, 185, 160, 0); }
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    footer a { color: var(--fg); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (prefers-reduced-motion: reduce) {
      .badge .pulse { animation: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="logo">covered<span class="dot">.</span></h1>
    <p class="tagline">Something new is on the way.</p>

    <span class="badge">
      <span class="pulse"></span>
      Coming soon
    </span>
  </main>

  <footer>
    &copy; <span id="year"></span> covered. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
